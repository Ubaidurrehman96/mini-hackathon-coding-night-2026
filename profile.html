<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="navbar">
    <div class="logo">
        <div class="logo-box">H</div>
        HelpHub AI
    </div>

    <div class="nav-links">
        <a href="/home.html">Dashboard</a>
        <a href="/profile.html" class="active">Profile</a>
    </div>
</div>

<div class="hero">
    <small>PROFILE</small>
    <h1>Ubaid-Ur-Rehman</h1>
    <p>Both • Karachi</p>
</div>

<div class="container">

    <div class="card left">
        <div class="label">PUBLIC PROFILE</div>
        <h2>Skills and reputation</h2>

        <div class="row">
            <span>Trust score</span>
            <strong>100%</strong>
        </div>

        <div class="row">
            <span>Contributions</span>
            <strong>35</strong>
        </div>

        <h4 style="margin-top:20px;">Skills</h4>
        <div class="tags">
            <span class="tag">React</span>
            <span class="tag">UI/UX</span>
            <span class="tag">HTML/CSS, JS</span>
            <span class="tag">Career Guidance</span>
        </div>

        <h4 style="margin-top:20px;">Badges</h4>
        <div class="tags">
            <span class="tag">Best Developer</span>
            <span class="tag">Fast Responder</span>
            <span class="tag">Top Mentor</span>
        </div>
    </div>

    <div class="card right">
        <div class="label">EDIT PROFILE</div>
        <h2>Update your identity</h2>

        <div class="form-row">
            <input type="text" value="Ubaid-Ur-Rehman">
            <input type="text" value="Karachi">
        </div>

        <label>Skills</label>
        <input type="text" value="React, UI/UX, HTML,CSS, JS Career Guidance">

        <label>Interests</label>
        <input type="text" value="Hackathons, Developments, Community Building">

        <button>Save profile</button>
    </div>

</div>

</body>
</html>
